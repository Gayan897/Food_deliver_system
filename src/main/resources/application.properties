spring.application.name=food-delivery
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:food_application_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
spring.jpa.hibernate.ddl-auto=update
logging.level.org.hibernate.tool.schema=TRACE
service.port = 8080
jwt.secret=MySuperSecureSecretKeyForHS512AlgorithmThatIsAtLeastSixtyFourCharactersLong12345
jwt.expiration=86400000
logging.level.com.fooddelivery.food_delivery=DEBUG
logging.level.org.springframework.security=DEBUG
